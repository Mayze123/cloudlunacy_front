# Simple HAProxy Data Plane API configuration
dataplaneapi:
  host: 0.0.0.0
  port: 5555
  scheme: http

  haproxy:
    config_file: /usr/local/etc/haproxy/haproxy.cfg
    haproxy_bin: /usr/sbin/haproxy

  userlist: dataplaneapi

  log_targets:
    - log_to: stdout
      log_level: info

  resources:
    reload_delay: 5
    reload_cmd: "kill -SIGUSR2 1"
